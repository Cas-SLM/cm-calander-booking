  #         build-args: |
  #           VERSION=${{ needs.release.outputs.new-version }}

  # =============================================================================
  # Stage 4: Merge Release to Main (Safe Merge)
  # =============================================================================

  merge-release-to-main:
    name: Merge Release to Main
    runs-on: ubuntu-latest
    needs: [release]
    if: needs.release.outputs.released == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: release
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch main branch
        run: git fetch origin main

      - name: Merge using GitHub API (safer)
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.repos.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                base: 'main',
                head: 'release'
              });
              console.log('Successfully merged release into main');
            } catch (error) {
              if (error.status === 409) {
                console.log('Merge conflict detected, creating pull request instead');
                const pr = await github.rest.pulls.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: 'Auto-merge release to main',
                  head: 'release',
                  base: 'main',
                  body: 'Automated merge of release branch after successful deployment and release.'
                });
                console.log(`Created PR #${pr.data.number} for manual review`);
              } else {
                throw error;
              }
            }

      - name: Checkout back to release
        run: |
          git checkout release