name: Release Pipeline

on:
  push:
    branches: [release]

env:
  REGISTRY: docker.io/${{ vars.DOCKERHUB_USERNAME }}
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =============================================================================
  # Stage 1: Deploy to Development
  # =============================================================================

  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Vercel Development
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          vercel-args: '--env NODE_ENV=development'

  # =============================================================================
  # Stage 2: Semantic Release
  # =============================================================================

  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: [deploy-dev]
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    outputs:
      new-version: ${{ steps.release.outputs.new_release_version }}
      released: ${{ steps.release.outputs.new_release_published }}
      tag-name: ${{ steps.release.outputs.new_release_git_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Semantic Release
        id: release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          semantic_version: 24
          extra_plugins: |
            @semantic-release/exec
            @semantic-release/git

  # =============================================================================
