name: CI Pipeline

on:
  push:
    branches: [main, release]
  pull_request:
    branches: [main, release]

env:
  REGISTRY: docker.io/${{ vars.DOCKERHUB_USERNAME }}
  IMAGE_NAME: ${{ github.event.repository.name }}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =============================================================================
  # Stage 1: Code Quality & Testing (Parallel Jobs)
  # =============================================================================

  lint:
    name: Code Quality (Lint & Format)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Check code formatting (Prettier)
        run: pnpm run format:check

      - name: Run ESLint
        run: pnpm run lint:check

  test:
    name: Test with Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Run tests with coverage
        run: pnpm run test:cov

  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Run pnpm audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 30

  # =============================================================================
  # Stage 2: Build & Security (Depends on lint + test)
  # =============================================================================

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [lint, test, dependency-scan]
    outputs:
      version: ${{ steps.package-json.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Build application
        run: pnpm run build

      - name: Extract package version
        id: package-json
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

  docker-build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    environment: cas-dev
    needs: [build]

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true          
          tags: docker.io/${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.version }}

      - name: Export image for scanning
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.version }}
          docker save ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.version }} > /tmp/app-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/app-image.tar
          retention-days: 1

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        id: load
        run: |
          docker load --input /tmp/docker-image/app-image.tar
          IMAGE_ID=$(docker images --quiet | head -n1)
          echo "image-id=$IMAGE_ID" >> $GITHUB_OUTPUT
          echo "image=$(docker images --format '{{.Repository}}:{{.Tag}}' | head -n1)" >> $GITHUB_OUTPUT

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.29.1
        with:
          image-ref: ${{ steps.load.outputs.image }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # =============================================================================
  # Stage 3: Trigger Release Pipeline
  # =============================================================================

  trigger-release:
    name: Trigger Release Pipeline
    runs-on: ubuntu-latest
    needs: [security-scan]
    if: github.ref == 'refs/heads/release' && needs.security-scan.result == 'success'
    steps:
      - name: Trigger release workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release.yml'
            })
            console.log('✅ Release pipeline triggered successfully')
