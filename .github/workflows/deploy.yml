name: Deploy Pipeline

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - production
      image_tag:
        description: 'Docker image tag to deploy (optional)'
        required: false
        type: string

env:
  REGISTRY: docker.io/${{ vars.DOCKERHUB_USERNAME }}
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}-${{ inputs.environment || 'test' }}
  cancel-in-progress: false

jobs:
  # =============================================================================
  # Stage 1: Validate Deployment
  # =============================================================================

  validate:
    name: Validate Deployment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.validate.outputs.environment }}
      image-tag: ${{ steps.validate.outputs.image-tag }}
      version: ${{ steps.validate.outputs.version }}
    steps:
      - name: Validate inputs
        id: validate
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            ENVIRONMENT="production"
            VERSION="${{ github.event.release.tag_name }}"
            IMAGE_TAG="${VERSION#v}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENVIRONMENT="${{ inputs.environment }}"
            VERSION="${{ inputs.image_tag || 'latest' }}"
            IMAGE_TAG="${VERSION}"
          else
            echo "Unsupported event type: ${{ github.event_name }}"
            exit 1
          fi
          
          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "image-tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          echo "✅ Deployment validation passed"
          echo "   Environment: $ENVIRONMENT"
          echo "   Image Tag: $IMAGE_TAG"
          echo "   Version: $VERSION"

  # =============================================================================
  # Stage 2: Deploy to Test Environment
  # =============================================================================

  deploy-test:
    name: Deploy to Test
    runs-on: ubuntu-latest
    needs: [validate]
    if: needs.validate.outputs.environment == 'test'
    environment: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Vercel Test
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          vercel-args: '--env NODE_ENV=test'

      - name: Verify deployment
        run: |
          echo "✅ Test deployment completed successfully"
          echo "   Environment: test"
          echo "   Image Tag: ${{ needs.validate.outputs.image-tag }}"
          echo "   Version: ${{ needs.validate.outputs.version }}"

  # =============================================================================
  # Stage 3: Deploy to Production Environment
  # =============================================================================

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [validate, deploy-test]
    if: needs.validate.outputs.environment == 'production'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Vercel Production
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          vercel-args: '--prod'

      - name: Verify deployment
        run: |
          echo "✅ Production deployment completed successfully"
          echo "   Environment: production"
          echo "   Image Tag: ${{ needs.validate.outputs.image-tag }}"
          echo "   Version: ${{ needs.validate.outputs.version }}"

  # =============================================================================
  # Stage 4: Post-Deployment Verification
  # =============================================================================

  post-deployment:
    name: Post-Deployment Verification
    runs-on: ubuntu-latest
    needs: [deploy-test, deploy-production]
    if: always() && (needs.deploy-test.result == 'success' || needs.deploy-production.result == 'success')
    steps:
      - name: Deployment summary
        run: |
          echo "🎉 Deployment pipeline completed!"
          echo ""
          echo "Results:"
          echo "  Test: ${{ needs.deploy-test.result }}"
          echo "  Production: ${{ needs.deploy-production.result }}"
          echo ""
          echo "Next steps:"
          if [[ "${{ needs.deploy-test.result }}" == "success" ]]; then
            echo "  ✅ Test environment is ready for validation"
            echo "  📋 Manual approval may be required for production"
          fi
          if [[ "${{ needs.deploy-production.result }}" == "success" ]]; then
            echo "  🚀 Production deployment completed successfully"
            echo "  📊 Monitor application health and performance"
          fi